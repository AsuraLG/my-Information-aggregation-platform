# 信息源配置
# 每个信息源需要指定：id、type、标签列表、采集频率（cron 表达式，UTC 时区）
# order: 展示排序，数值越小越靠前，默认 999（可选）

sources:
  - id: "sebastian_raschka"
    desc: "Sebastian Raschka的AI洞察"
    type: rss
    url: "https://magazine.sebastianraschka.com/feed"
    tags: ["AI"]
    schedule: "0 9 * * *"  # 每天 UTC 9:00
    order: 10

  - id: "linux_do_top"
    desc: "LINUX DO 热门话题"
    type: rss
    url: "https://linuxdorss.longpink.com/top.xml"
    tags: ["AI", "programming"]
    schedule: "0 9 * * *"  # 每天 UTC 9:00
    order: 20

  - id: "github_trending_python"
    desc: "GitHub Trending · Python"
    type: github_trending
    language: "python"
    period: "daily"  # daily / weekly / monthly
    tags: ["AI", "python", "opensource"]
    schedule: "0 9 * * *"  # 每天 UTC 9:00
    order: 30

  - id: "github_trending_java"
    desc: "GitHub Trending · Java"
    type: github_trending
    language: "java"  # 空字符串表示不限语言
    period: "daily"
    tags: ["java", "opensource"]
    schedule: "0 9 * * *"
    order: 40

  - id: "xiaoheihe_game_news"
    desc: "小黑盒游戏资讯"
    type: rss
    url: "https://rsshub.rss3.workers.dev/xiaoheihe/news"
    tags: ["game"]
    schedule: "0 */6 * * *"  # 每6小时采集一次
    order: 50
