<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的信息聚合</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: #ffffff;
      --border: rgba(148, 163, 184, 0.24);
      --text: #1f2937;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-soft: rgba(37, 99, 235, 0.12);
      --accent: #7c3aed;
      --accent-soft: rgba(124, 58, 237, 0.12);
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.12), transparent 22%),
        var(--bg);
      color: var(--text);
    }
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .hero {
      background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.78));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px 30px 24px;
      margin-bottom: 22px;
      backdrop-filter: blur(8px);
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: .84rem;
    }
    .date-list {
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 20px 22px;
      margin-bottom: 24px;
      backdrop-filter: blur(8px);
    }
    .date-list h2 {
      font-size: 1rem;
      color: #0f172a;
      margin: 0 0 14px;
    }
    .date-list ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .date-list li a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      text-decoration: none;
      font-size: .88rem;
    }
    .date-list li a:hover { border-color: rgba(37, 99, 235, 0.35); color: var(--primary); }
    .date-list .latest {
      font-size: .74rem;
      color: var(--primary);
    }
    .digest-block {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.14), rgba(124, 58, 237, 0.12));
      border: 1px solid rgba(37, 99, 235, 0.18);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      margin-bottom: 26px;
      box-shadow: var(--shadow);
    }
    .digest-block h2 {
      margin: 0 0 12px;
      font-size: 1.02rem;
      color: var(--primary);
    }
    .digest-content {
      line-height: 1.8;
      font-size: .95rem;
      color: #1e293b;
    }
    .digest-content p { margin: .35rem 0; }
    .summary-grid {
      display: grid;
      gap: 18px;
    }
    .tag-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 22px 24px;
      backdrop-filter: blur(8px);
    }
    .tag-card-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .tag-card h2 {
      margin: 0;
      font-size: 1.15rem;
      color: #0f172a;
    }
    .tag-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: .78rem;
      font-weight: 600;
    }
    .source-meta {
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: rgba(248, 250, 252, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      color: var(--muted);
      font-size: .83rem;
      line-height: 1.7;
    }
    .summary {
      line-height: 1.8;
      font-size: .94rem;
    }
    .summary p { margin: .35rem 0; }
    .summary ul, .summary ol { padding-left: 1.4rem; margin: .4rem 0; }
    .summary code {
      background: #eef2ff;
      padding: .12em .35em;
      border-radius: 6px;
      font-size: .85em;
    }
    .empty-state {
      padding: 32px 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.7);
      border: 1px dashed rgba(148, 163, 184, 0.4);
      border-radius: var(--radius-lg);
    }
    footer {
      margin-top: 34px;
      font-size: .8rem;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>我的信息聚合</h1>
      <p>个人信息聚合平台，每日自动更新</p>
      <div class="meta">
        <span class="meta-pill">生成时间：2026-03-25 11:35 CST</span>
        <span class="meta-pill">数据日期：2026-03-24</span>
      </div>
    </section>

    

    

    
    <div class="empty-state">暂无摘要数据。</div>
    

    <footer>由 info-aggregator 自动生成</footer>
  </main>
</body>
</html>
